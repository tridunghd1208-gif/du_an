<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Invaders</title>
  <!-- Liên kết tới file CSS để trang trí giao diện -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>SPACE INVADERS</h1>

  <!-- Dòng hiển thị điểm số hiện tại và điểm cao nhất -->
  <div id="scoreboard">
    <span>Điểm: <strong id="score">0</strong></span>
    <span>Điểm cao nhất: <strong id="highScore">0</strong></span>
  </div>

  <!-- Toàn bộ hình ảnh game sẽ được vẽ lên thẻ canvas này -->
  <canvas id="gameCanvas" width="600" height="600"></canvas>

  <!-- Hướng dẫn chơi -->
  <p id="hint">← → để di chuyển | Space để bắn</p>

  <!-- Liên kết tới file JavaScript (đặt cuối trang để HTML tải xong trước) -->
  <script src="script.js"></script>
</body>
</html>
