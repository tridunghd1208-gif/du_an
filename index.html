<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Space Invaders</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===== TRANG ĐĂNG NHẬP ===== -->
  <!-- Tiêu đề lớn tên game ở trên, form đăng nhập ở dưới. -->
  <div id="loginScreen" class="auth-screen">
    <h1>SPACE INVADERS</h1>

    <form id="loginForm" class="login-box">
      <h2>ĐĂNG NHẬP</h2>

      <label for="loginUsername">Tên đăng nhập</label>
      <input type="text" id="loginUsername" placeholder="admin" autocomplete="username" />

      <label for="loginPassword">Mật khẩu</label>
      <input type="password" id="loginPassword" placeholder="••••" autocomplete="current-password" />

      <!-- Dòng báo lỗi -->
      <p id="loginError" class="login-error"></p>

      <button type="submit">Đăng nhập</button>

      <p class="login-switch">
        Chưa có tài khoản?
        <a href="register.html">Đăng ký</a>
      </p>
      <p class="login-hint">Tài khoản demo: admin / 1234</p>
    </form>
  </div>

  <!-- Xử lý đăng nhập -->
  <script src="auth.js"></script>
</body>
</html>
